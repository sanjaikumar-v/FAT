apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-app
spec:
  selector:
    matchLabels:
      app: movie
  template:
    metadata:
      labels:
        app: movie
    spec:
      containers:
      - name: movie-rating
        image: sanjaikumar1one/movie-rating:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: movie-service
spec:
  type: NodePort
  selector:
    app: movie
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
